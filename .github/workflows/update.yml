name: Daily data update

on:
  schedule:
    # 22:30 UTC Mon-Fri = ~1.5h after US market close = 05:30 ICT
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run pipeline
        run: python fetch_data.py

      - name: Commit results
        run: |
          git config user.name "rotation-bot"
          git config user.email "actions@github.com"
          git add data.json history.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%F)"
          git push
